# ──────────────────────────────────────────────────────────────────────────────
# EVE — Daily Recap (public) + Ops Report (private)
#
# Runs automatically at midnight UTC (after the day's activity concludes) and
# on demand. Reads from Supabase and sends two separate Telegram messages:
#
#   • PUBLIC RECAP → TELEGRAM_CHAT_ID (subscriber channel): a friendly summary
#     of the day's shared signals plus a link to the site. NO business detail.
#   • OPS REPORT   → TELEGRAM_ADMIN_CHAT_ID (private, owner-only) if configured:
#     fixtures polled, polling cadence, API request counts vs quota, projections.
#     If that secret is unset, the ops report stays in the (private) job logs.
#
# API quota / polling internals are deliberately kept OUT of the public channel.
#
# The report NEVER makes API-Football calls — it is entirely read-only against
# Supabase and cannot burn quota.
# ──────────────────────────────────────────────────────────────────────────────

name: EVE Status Report

on:
  schedule:
    # Midnight UTC — captures the full day's usage in one shot.
    - cron: '0 0 * * *'

  workflow_dispatch:
    inputs:
      daily_quota:
        description: 'Override daily quota for the report (default: 75000)'
        type: string
        default: '75000'

jobs:
  report:
    name: Build & Send Status Report
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
      # Private owner-only chat for the full ops report (fixtures, quota,
      # projections). Leave unset to keep the ops report to the job logs only.
      TELEGRAM_ADMIN_CHAT_ID:    ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
      # Use dispatch override or the API-Football Ultra plan default
      DAILY_QUOTA:               ${{ inputs.daily_quota || '75000' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build and send status report
        run: node reportStatus.js
