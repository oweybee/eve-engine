# ──────────────────────────────────────────────────────────────────────────────
# EVE — Daily API Usage + Polling Frequency Report
#
# Runs automatically at midnight UTC (after the day's activity concludes) and
# on demand. Queries today's engine_plan from Supabase and sends a Telegram
# message showing:
#   • Which fixtures were polled for odds
#   • Polling interval and runs completed / planned
#   • Exact API request counts per script vs 75,000 daily quota
#
# This is an INTERNAL ops report. It is sent to a PRIVATE admin chat
# (TELEGRAM_ADMIN_CHAT_ID) only — never to the public signals channel — so
# subscribers never see API usage or polling internals.
#
# The report NEVER makes API-Football calls — it is entirely read-only against
# Supabase and cannot burn quota.
# ──────────────────────────────────────────────────────────────────────────────

name: EVE Status Report

on:
  schedule:
    # Midnight UTC — captures the full day's usage in one shot.
    - cron: '0 0 * * *'

  workflow_dispatch:
    inputs:
      daily_quota:
        description: 'Override daily quota for the report (default: 75000)'
        type: string
        default: '75000'

jobs:
  report:
    name: Build & Send Status Report
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
      # Internal ops report → PRIVATE admin chat only, never the public signals
      # channel. Set this secret to your personal/admin chat ID to receive it.
      TELEGRAM_ADMIN_CHAT_ID:    ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
      # Use dispatch override or the API-Football Ultra plan default
      DAILY_QUOTA:               ${{ inputs.daily_quota || '75000' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build and send status report
        run: node reportStatus.js
