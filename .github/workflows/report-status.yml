# ──────────────────────────────────────────────────────────────────────────────
# EVE — Daily API Usage + Polling Frequency Report
#
# Runs automatically at midnight UTC (after the day's activity concludes) and
# on demand. Queries today's engine_plan from Supabase and sends a Telegram
# message showing:
#   • Which fixtures were polled for odds
#   • Polling interval and runs completed / planned
#   • Exact API request counts per script vs 75,000 daily quota
#   • Projected end-of-day usage with quota risk warnings
#
# The report NEVER makes API-Football calls — it is entirely read-only against
# Supabase and cannot burn quota.
# ──────────────────────────────────────────────────────────────────────────────

name: EVE Status Report

# NOTE: The automatic midnight-UTC schedule was removed on 2026-07-04 at the
# owner's request — the daily status report was being posted to Telegram and is
# no longer wanted on a recurring basis. The report can still be generated on
# demand via the "Run workflow" button (workflow_dispatch) below.
on:
  workflow_dispatch:
    inputs:
      daily_quota:
        description: 'Override daily quota for the report (default: 75000)'
        type: string
        default: '75000'

jobs:
  report:
    name: Build & Send Status Report
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
      # Use dispatch override or the API-Football Ultra plan default
      DAILY_QUOTA:               ${{ inputs.daily_quota || '75000' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build and send status report
        run: node reportStatus.js
