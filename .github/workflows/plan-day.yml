name: Plan Day

# Runs once daily at 05:00 UTC — before the active polling window opens (08:00).
# Fetches today's World Cup fixtures, calculates the optimal polling interval
# based on the daily request budget, and writes the plan to Supabase.
# ingestOdds.js reads this plan to gate its own execution.
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      FOOTBALL_DATA_KEY:         ${{ secrets.FOOTBALL_DATA_KEY }}
      COMPETITION:               'WC'
      DAILY_REQUEST_BUDGET:      '100'
      ACTIVE_START_HOUR:         '8'
      ACTIVE_END_HOUR:           '24'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Plan today's polling schedule
        run: node planDay.js
