name: Plan Day

# Runs once daily at 05:00 UTC — before the active polling window opens (08:00).
# Fetches today's World Cup fixtures, calculates the optimal polling interval
# based on the daily request budget, and writes the plan to Supabase.
# ingestOdds.js reads this plan to gate its own execution.
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      RAPIDAPI_KEY:              ${{ secrets.RAPIDAPI_KEY }}
      # World Cup league ID on API-Football. Default: 1 (FIFA World Cup).
      # Override here or via the WORLD_CUP_LEAGUE_ID secret if needed.
      WORLD_CUP_LEAGUE_ID:       '1'
      FOOTBALL_SEASON:           '2026'
      # Total API requests available per day (free tier = 100).
      DAILY_REQUEST_BUDGET:      '100'
      # Active polling window — UTC hours. 8 = 08:00, 24 = midnight.
      ACTIVE_START_HOUR:         '8'
      ACTIVE_END_HOUR:           '24'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Plan today's polling schedule
        run: node planDay.js
