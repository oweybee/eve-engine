name: Run EVE Engine

# The engine ingests fresh odds and recomputes value signals.
# - Scheduled every 10 minutes (GitHub's shortest reliable cron granularity)
# - Manual trigger available via the "Run workflow" button (workflow_dispatch)
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  run-engine:
    runs-on: ubuntu-latest

    # All three credentials come from GitHub repository secrets.
    # Add them under: Settings → Secrets and variables → Actions → New repository secret
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      # Optional — used by fetchResults.js to settle results via API-Sports. If unset,
      # is skipped gracefully (the run still succeeds).
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      # X (Twitter) — required by postToX.js
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_SECRET: ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
      # Telegram — used by postToX.js to post signals to the channel
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Node 22: @supabase/supabase-js requires native WebSocket support,
      # which only exists in Node 22+ (Node 18/20 fail at startup).
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # The engine files live at the repository root (this repo IS the engine folder),
      # so npm install and the node scripts all run from the checkout root.
      - name: Install dependencies
        run: npm install

      - name: Ingest odds
        run: node ingestOdds.js

      - name: Compute values
        run: node computeValues.js

      - name: Settle results & refresh performance summary
        run: node fetchResults.js

      # .x_state.json tracks which signal IDs have already been posted so that
      # the 10-minute cron never re-tweets the same signal. The cache persists
      # the file across workflow runs; each run saves under a unique key and
      # restores from the most recent prior key.
      - name: Restore X post state
        uses: actions/cache@v4
        with:
          path: .x_state.json
          key: x-state-${{ github.run_id }}
          restore-keys: x-state-

      - name: Post signals to X
        run: node postToX.js

      - name: Save X post state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .x_state.json
          key: x-state-${{ github.run_id }}
