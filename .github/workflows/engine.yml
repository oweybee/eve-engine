# ──────────────────────────────────────────────────────────────────────────────
# MaxEdge EVE Engine  —  5-minute cron, ~1-minute live odds updates
#
# Budget: 75,000 req/day ÷ 12 matches = 6,250 possible cycles/day
# GitHub Actions minimum: 5 min cron = 288 jobs/day
# Strategy: loop ingest+compute+snapshot 4× per job with 55s gaps
#   → 288 jobs × 4 loops × 12 req = 13,824 req/day (18% of budget)
#   → odds fresh every ~55 seconds within active windows
#
# Pipeline per job:
#   [loop ×4] ingestOdds.js     — pull latest odds; self-gates on next_run_at
#             computeValues.js  — Kaunitz edge detection; upserts computed_values
#             captureSnapshot.js — record odds time-series for live charts
#   [once]  computeApiValues.js — API-Football predictive model
#           postToX.js          — Telegram alerts for new value signals
#           fetchResults.js     — settle completed fixtures
#           fetchMatchDetails.js — lineups, predictions, match stats
# ──────────────────────────────────────────────────────────────────────────────

name: MaxEdge EVE Engine

on:
  schedule:
    # Fire every 5 minutes. Within each job we loop ingest+compute+snapshot
    # 4x so odds are fresh every ~55 seconds, not every 5 minutes.
    - cron: '*/5 * * * *'

  workflow_dispatch:
    inputs:
      skip_ingest:
        description: 'Skip ingest loop (reuse existing odds)'
        type: boolean
        default: false
      skip_post:
        description: 'Skip postToX.js (suppress Telegram alerts)'
        type: boolean
        default: false
      skip_results:
        description: 'Skip fetchResults.js'
        type: boolean
        default: false
      loop_count:
        description: 'Number of ingest loops per job (default 4)'
        type: string
        default: '4'

concurrency:
  group: engine-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  engine:
    name: EVE Engine Tick
    runs-on: ubuntu-latest

    # 5 min covers: ~25s setup + 4 loops×(20s work + 55s sleep) minus last sleep
    # = 25 + (20+55)*3 + 20 = 270s = 4.5 min. 5 min gives comfortable headroom.
    timeout-minutes: 5

    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      API_FOOTBALL_KEY:          ${{ secrets.API_FOOTBALL_KEY }}
      BETFAIR_APP_KEY:           ${{ secrets.BETFAIR_APP_KEY }}
      BETFAIR_USERNAME:          ${{ secrets.BETFAIR_USERNAME }}
      BETFAIR_PASSWORD:          ${{ secrets.BETFAIR_PASSWORD }}
      TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
      ACTIVE_START_HOUR:         ${{ vars.ACTIVE_START_HOUR  || '0'  }}
      ACTIVE_END_HOUR:           ${{ vars.ACTIVE_END_HOUR    || '24' }}
      SHARPNESS_MULTI_BOOK:      ${{ vars.SHARPNESS_MULTI_BOOK  }}
      SHARPNESS_SINGLE_BOOK:     ${{ vars.SHARPNESS_SINGLE_BOOK }}
      MULTI_BOOK_THRESHOLD:      ${{ vars.MULTI_BOOK_THRESHOLD  }}
      COMPUTE_CONCURRENCY:       ${{ vars.COMPUTE_CONCURRENCY   }}
      EV_THRESHOLD:              ${{ vars.EV_THRESHOLD          }}
      MIN_PROB:                  ${{ vars.MIN_PROB              }}
      MAX_ODDS:                  ${{ vars.MAX_ODDS              }}
      SIGNAL_EDGE:               ${{ vars.SIGNAL_EDGE           }}
      DAILY_REQUEST_BUDGET:      ${{ vars.DAILY_REQUEST_BUDGET || '75000' }}
      GITHUB_RUN_ID:             ${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (cached)
        run: npm install --no-audit --no-fund

      # ── Live odds loop ───────────────────────────────────────────────────────────
      # Runs ingest+compute+snapshot 4x with 55s gaps so the odds table and
      # chart snapshots are updated roughly every minute. ingestOdds.js
      # self-gates on engine_plan.next_run_at so off-hours iterations are
      # instant no-ops that cost zero API requests.
      - name: Live odds loop (ingest → compute → snapshot)
        id: ingest_loop
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_ingest != 'true' }}
        shell: bash
        run: |
          LOOPS=${{ github.event.inputs.loop_count || '4' }}
          LOOP_EXIT=0
          for i in $(seq 1 $LOOPS); do
            echo "--- Loop $i / $LOOPS ---"
            node ingestOdds.js    || LOOP_EXIT=$?
            node computeValues.js || LOOP_EXIT=$?
            node captureSnapshot.js 2>/dev/null || true
            if [ "$i" -lt "$LOOPS" ]; then
              echo "Sleeping 55s before next loop..."
              sleep 55
            fi
          done
          exit $LOOP_EXIT

      # ── Once-per-job steps ───────────────────────────────────────────────────────
      # These run once after the loop finishes. Signals, results and details
      # don't need to fire every 55 seconds — once per 5-min job is enough.

      - name: Compute API predictive values
        id: api_compute
        continue-on-error: true
        run: node computeApiValues.js

      - name: Post signals
        id: post
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_post != 'true' }}
        run: node postToX.js

      - name: Settle results
        id: results
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_results != 'true' }}
        run: node fetchResults.js

      - name: Fetch match details (lineups + stats)
        id: details
        continue-on-error: true
        run: node fetchMatchDetails.js

      # ── Failure telemetry ─────────────────────────────────────────────────────
      - name: Alert on pipeline failure
        if: failure()
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.ENGINE_ALERT_WEBHOOK }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          FAILED_STEPS=""
          [ "${{ steps.ingest_loop.outcome }}" = "failure" ] && FAILED_STEPS="${FAILED_STEPS}\n• \`ingest-loop\` (ingest+compute+snapshot)"
          [ "${{ steps.api_compute.outcome }}" = "failure" ] && FAILED_STEPS="${FAILED_STEPS}\n• \`api-compute\` (computeApiValues.js)"
          [ "${{ steps.post.outcome }}"        = "failure" ] && FAILED_STEPS="${FAILED_STEPS}\n• \`post-signals\` (postToX.js)"
          [ "${{ steps.results.outcome }}"     = "failure" ] && FAILED_STEPS="${FAILED_STEPS}\n• \`settle-results\` (fetchResults.js)"
          [ "${{ steps.details.outcome }}"     = "failure" ] && FAILED_STEPS="${FAILED_STEPS}\n• \`fetch-details\` (fetchMatchDetails.js)"
          [ -z "$FAILED_STEPS" ] && FAILED_STEPS="\n• \`setup\` (checkout / node / npm ci)"

          PAYLOAD=$(jq -n \
            --arg failed  "$FAILED_STEPS" \
            --arg run_url "$RUN_URL" \
            --arg run_num "${{ github.run_number }}" \
            --arg branch  "${{ github.ref_name }}" \
            --arg trigger "${{ github.event_name }}" \
            --arg actor   "${{ github.actor }}" \
            --arg repo    "${{ github.repository }}" \
            --arg sha     "${GITHUB_SHA::7}" \
            --arg ts      "$TIMESTAMP" \
            '{
              embeds: [{
                title: "[FAIL] EVE Engine — Pipeline Failure",
                description: ("A step failed on run [#" + $run_num + "](" + $run_url + "). Odds ingestion may be stalled."),
                color: 15548997,
                url: $run_url,
                fields: [
                  { name: "Failed Step(s)", value: $failed,                                              inline: false },
                  { name: "Branch",         value: ("`" + $branch + "`"),                               inline: true  },
                  { name: "Commit",         value: ("`" + $sha + "`"),                                 inline: true  },
                  { name: "Trigger",        value: $trigger,                                            inline: true  },
                  { name: "Actor",          value: $actor,                                              inline: true  },
                  { name: "Run logs",       value: ("[View run #" + $run_num + "](" + $run_url + ")"), inline: false }
                ],
                timestamp: $ts,
                footer: { text: ("MaxEdge EVE Engine  ·  " + $repo) }
              }]
            }')

          HTTP_STATUS=$(curl -s -o /tmp/wh.txt -w "%{http_code}" -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" -d "$PAYLOAD")
          [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ] \
            && echo "Alert delivered (HTTP $HTTP_STATUS)" \
            || echo "::warning::Webhook returned HTTP $HTTP_STATUS"
