# ──────────────────────────────────────────────────────────────────────────────
# MaxEdge EVE Engine  —  5-minute value detection pipeline
#
# Pipeline per tick:
#   1. ingestOdds.js        — pull latest odds from API-Football; plan-gated, so most
#                             ticks cost zero API requests outside the active window
#   2. computeValues.js     — market consensus edge detection (Kaunitz et al.);
#                             upserts computed_values, writes value_signals
#   3. computeApiValues.js  — API-Football predictive engine; coexists via composite
#                             unique (match_id, model_architecture)
#   4. captureSnapshot.js   — record best odds per outcome + CLV open/closing snaps
#                             (runs after compute so charts always reflect current data)
#   5. postToX.js           — fire Telegram alerts for new value signals
#   6. fetchResults.js      — settle completed fixtures (scores → value_signals)
#   7. fetchMatchDetails.js — lineups, predictions, match stats (continue-on-error)
#
# Companion workflow: plan-day.yml fires at 05:00 UTC and writes the daily
# engine_plan to Supabase; ingestOdds.js reads this plan to self-gate.
# ──────────────────────────────────────────────────────────────────────────────

name: MaxEdge EVE Engine

on:
  schedule:
    # Pulse every 5 minutes, 24 / 7. ingestOdds.js self-gates against
    # engine_plan.next_run_at, so off-hours ticks are < 1 s no-ops.
    - cron: '*/5 * * * *'

  workflow_dispatch:
    inputs:
      skip_ingest:
        description: 'Skip ingestOdds.js (reuse existing odds — useful for backtest reruns)'
        type: boolean
        default: false
      skip_post:
        description: 'Skip postToX.js (suppress Telegram alerts — useful for dry-run compute)'
        type: boolean
        default: false
      skip_results:
        description: 'Skip fetchResults.js (skip result settlement this tick)'
        type: boolean
        default: false

# ── Concurrency ───────────────────────────────────────────────────────────────
# Prevents overlapping runs that would cause duplicate DB writes or connection
# pool exhaustion. With cancel-in-progress: false the behaviour is:
#   • In-progress run is NEVER interrupted (safe mid-write guarantee).
#   • Each new cron tick queues as "pending"; if another pending run is already
#     waiting, the new tick REPLACES it (last-in wins — always run fresh data).
# Net effect: at most 1 running + 1 queued run at any moment.
concurrency:
  group: engine-${{ github.ref_name }}
  cancel-in-progress: false

# Minimal permissions — read-only repo access, no id-token or write-packages.
permissions:
  contents: read

jobs:
  engine:
    name: EVE Engine Tick
    runs-on: ubuntu-latest

    # Hard time-box: must complete before the next 5-min cron tick to avoid
    # run pile-up. 4 min leaves 1 min slack. If a step hangs (API stall,
    # OOM), the job is killed and the alert step fires.
    timeout-minutes: 4

    env:
      # ── Supabase ─────────────────────────────────────────────────────────────
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # ── Odds API (API-Football v3) ───────────────────────────────────────────
      API_FOOTBALL_KEY:          ${{ secrets.API_FOOTBALL_KEY }}

      # ── Betfair Exchange ─────────────────────────────────────────────────────
      BETFAIR_APP_KEY:           ${{ secrets.BETFAIR_APP_KEY }}
      BETFAIR_USERNAME:          ${{ secrets.BETFAIR_USERNAME }}
      BETFAIR_PASSWORD:          ${{ secrets.BETFAIR_PASSWORD }}

      # ── Telegram / signal delivery ───────────────────────────────────────────
      TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}

      # ── Active window (must match plan-day.yml) ───────────────────────────────
      ACTIVE_START_HOUR:         ${{ vars.ACTIVE_START_HOUR  || '0'  }}
      ACTIVE_END_HOUR:           ${{ vars.ACTIVE_END_HOUR    || '24' }}

      # ── Model tuning (override after running calibrate.js) ───────────────────
      SHARPNESS_MULTI_BOOK:      ${{ vars.SHARPNESS_MULTI_BOOK  }}
      SHARPNESS_SINGLE_BOOK:     ${{ vars.SHARPNESS_SINGLE_BOOK }}
      MULTI_BOOK_THRESHOLD:      ${{ vars.MULTI_BOOK_THRESHOLD  }}
      COMPUTE_CONCURRENCY:       ${{ vars.COMPUTE_CONCURRENCY   }}
      EV_THRESHOLD:              ${{ vars.EV_THRESHOLD          }}
      MIN_PROB:                  ${{ vars.MIN_PROB              }}
      MAX_ODDS:                  ${{ vars.MAX_ODDS              }}
      SIGNAL_EDGE:               ${{ vars.SIGNAL_EDGE           }}
      DAILY_REQUEST_BUDGET:      ${{ vars.DAILY_REQUEST_BUDGET || '75000' }}

      # ── GitHub run context ───────────────────────────────────────────────────
      GITHUB_RUN_ID:             ${{ github.run_id }}

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      # ── Node.js setup with dependency cache ──────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies (cached)
        run: npm install --no-audit --no-fund

      # ── Pipeline ─────────────────────────────────────────────────────────────
      # Order: ingest → compute (Kaunitz) → compute (API predictive) → snapshot
      #        → post → results → details
      # NOTE: both compute steps must run before snapshot so charts always
      # reflect the freshest computed_values from both model tracks.

      - name: Ingest odds
        id: ingest
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_ingest != 'true' }}
        run: node ingestOdds.js

      - name: Compute values (Kaunitz market consensus)
        id: compute
        run: node computeValues.js

      - name: Compute API predictive values
        id: api_compute
        continue-on-error: true
        run: node computeApiValues.js

      - name: Capture snapshot
        id: snapshot
        continue-on-error: true
        run: node captureSnapshot.js

      - name: Post signals
        id: post
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_post != 'true' }}
        run: node postToX.js

      - name: Settle results
        id: results
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_results != 'true' }}
        run: node fetchResults.js

      - name: Fetch match details (lineups + stats)
        id: details
        continue-on-error: true
        run: node fetchMatchDetails.js

      # ── Failure telemetry ─────────────────────────────────────────────────────
      - name: Alert on pipeline failure
        if: failure()
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.ENGINE_ALERT_WEBHOOK }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          FAILED_STEPS=""
          [ "${{ steps.ingest.outcome }}"      = "failure" ] && FAILED_STEPS="${FAILED_STEPS}\n• \`ingest-odds\` (ingestOdds.js)"
          [ "${{ steps.compute.outcome }}"     = "failure" ] && FAILED_STEPS="${FAILED_STEPS}\n• \`compute-values\` (computeValues.js)"
          [ "${{ steps.api_compute.outcome }}" = "failure" ] && FAILED_STEPS="${FAILED_STEPS}\n• \`api-compute\` (computeApiValues.js)"
          [ "${{ steps.snapshot.outcome }}"    = "failure" ] && FAILED_STEPS="${FAILED_STEPS}\n• \`capture-snapshot\` (captureSnapshot.js)"
          [ "${{ steps.post.outcome }}"        = "failure" ] && FAILED_STEPS="${FAILED_STEPS}\n• \`post-signals\` (postToX.js)"
          [ "${{ steps.results.outcome }}"     = "failure" ] && FAILED_STEPS="${FAILED_STEPS}\n• \`settle-results\` (fetchResults.js)"
          [ "${{ steps.details.outcome }}"     = "failure" ] && FAILED_STEPS="${FAILED_STEPS}\n• \`fetch-details\` (fetchMatchDetails.js)"

          [ -z "$FAILED_STEPS" ] && FAILED_STEPS="\n• \`setup\` (checkout / node / npm ci)"

          PAYLOAD=$(jq -n \
            --arg failed   "$FAILED_STEPS" \
            --arg run_url  "$RUN_URL" \
            --arg run_id   "${{ github.run_id }}" \
            --arg run_num  "${{ github.run_number }}" \
            --arg branch   "${{ github.ref_name }}" \
            --arg trigger  "${{ github.event_name }}" \
            --arg actor    "${{ github.actor }}" \
            --arg repo     "${{ github.repository }}" \
            --arg sha      "${GITHUB_SHA::7}" \
            --arg ts       "$TIMESTAMP" \
            '{
              embeds: [{
                title: "[FAIL] EVE Engine — Pipeline Failure",
                description: (
                  "A step exited non-zero on run [#" + $run_num + "](" + $run_url + ").\n"
                  + "Odds ingestion or signal delivery **may be stalled**. Investigate immediately."
                ),
                color: 15548997,
                url:   $run_url,
                fields: [
                  { name: "Failed Step(s)", value: $failed,                                              inline: false },
                  { name: "Branch",         value: ("`" + $branch + "`"),                               inline: true  },
                  { name: "Commit",         value: ("`" + $sha + "`"),                                 inline: true  },
                  { name: "Trigger",        value: $trigger,                                            inline: true  },
                  { name: "Actor",          value: $actor,                                              inline: true  },
                  { name: "Run logs",       value: ("[View run #" + $run_num + "](" + $run_url + ")"), inline: false }
                ],
                timestamp: $ts,
                footer: { text: ("MaxEdge EVE Engine  ·  " + $repo) }
              }]
            }')

          HTTP_STATUS=$(curl -s -o /tmp/webhook_response.txt -w "%{http_code}" \
            -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Alert delivered (HTTP $HTTP_STATUS)"
          else
            echo "::warning::ENGINE_ALERT_WEBHOOK returned HTTP $HTTP_STATUS — check the secret and webhook URL"
            echo "::warning::Webhook response: $(cat /tmp/webhook_response.txt)"
          fi
