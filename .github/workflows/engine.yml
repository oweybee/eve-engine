# ────────────────────────────────────────────────────────────────────────────
# MaxEdge EVE Engine  —  live odds pipeline
#
# Budget: 75,000 API req/day
#   288 jobs/day × 4 ingest loops × ~12 fixtures = ~13,824 req/day (18%)
#   Odds refresh every ~55 seconds during each 5-minute job.
#
# Pipeline per job:
#   (Betfair secondary markets — corners/cards/O-U/BTTS — are ingested from a UK
#    host, not here; Betfair geo-blocks US runners. See scripts/betfair-vps/.)
#   Once per job (idempotent early-exit if plan exists):
#     0. planDay.js       — build / refresh today+3day fixture plan
#   Loop ×4 (55s gap):
#     1. ingestOdds.js    — pull latest odds; plan-gated (off-hours = no-op)
#     2. computeValues.js — Kaunitz edge detection; price-change signals
#     3. captureSnapshot.js — odds time-series for charts
#   Once per job:
#     4. computeApiValues.js — XG/API predictive model
#     5. postToX.js          — Telegram: VALUE / RUBY / ODDS MOVEMENT alerts
#     6. fetchResults.js     — settle completed fixtures
#     7. fetchMatchDetails.js — lineups + stats
# ────────────────────────────────────────────────────────────────────────────

name: MaxEdge EVE Engine

on:
  schedule:
    # Every 5 minutes — minimum GitHub Actions interval.
    # ingestOdds.js self-gates against engine_plan.next_run_at.
    - cron: '*/5 * * * *'

  workflow_dispatch:
    inputs:
      skip_ingest:
        description: 'Skip ingestOdds.js'
        type: boolean
        default: false
      skip_post:
        description: 'Skip postToX.js (suppress Telegram alerts)'
        type: boolean
        default: false
      skip_results:
        description: 'Skip fetchResults.js'
        type: boolean
        default: false
      loop_count:
        description: 'Number of ingest loops (default 4)'
        type: string
        default: '4'

concurrency:
  group: engine-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  engine:
    name: EVE Engine Tick
    runs-on: ubuntu-latest
    # 10 min (was 5): the 4-loop odds cycle nearly fills 5 min, so fetchTeamStats
    # (the last step) was being killed mid-run. It self-caches per team (20h), so
    # only the first full population is slow; later runs skip fresh teams.
    timeout-minutes: 10

    env:
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      API_FOOTBALL_KEY:          ${{ secrets.API_FOOTBALL_KEY }}
      BETFAIR_APP_KEY:           ${{ secrets.BETFAIR_APP_KEY }}
      BETFAIR_USERNAME:          ${{ secrets.BETFAIR_USERNAME }}
      BETFAIR_PASSWORD:          ${{ secrets.BETFAIR_PASSWORD }}
      TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}
      ACTIVE_START_HOUR:         '0'
      ACTIVE_END_HOUR:           '24'
      DAILY_REQUEST_BUDGET:      ${{ vars.DAILY_REQUEST_BUDGET || '75000' }}
      SHARPNESS_MULTI_BOOK:      ${{ vars.SHARPNESS_MULTI_BOOK  }}
      SHARPNESS_SINGLE_BOOK:     ${{ vars.SHARPNESS_SINGLE_BOOK }}
      MULTI_BOOK_THRESHOLD:      ${{ vars.MULTI_BOOK_THRESHOLD  }}
      COMPUTE_CONCURRENCY:       ${{ vars.COMPUTE_CONCURRENCY   }}
      EV_THRESHOLD:              ${{ vars.EV_THRESHOLD          }}
      MIN_PROB:                  ${{ vars.MIN_PROB              }}
      MAX_ODDS:                  ${{ vars.MAX_ODDS              }}
      SIGNAL_EDGE:               ${{ vars.SIGNAL_EDGE           }}
      GITHUB_RUN_ID:             ${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Plan today's fixtures
        id: plan
        continue-on-error: true
        env:
          DAYS_AHEAD: '3'
        run: node planDay.js

      # Betfair ingest does NOT run here: Betfair geo-blocks GitHub's US runners
      # (HTTP 403 "Restricted"). It runs on a UK host instead — see
      # scripts/betfair-vps/README.md — writing corners/cards/O-U/BTTS straight
      # to Supabase, which this pipeline then prices on the next compute.

      - name: Live odds loop (ingest -> compute -> snapshot)
        id: ingest_loop
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_ingest != 'true' }}
        shell: bash
        run: |
          LOOPS=${{ github.event.inputs.loop_count || '4' }}
          LOOP_EXIT=0
          for i in $(seq 1 $LOOPS); do
            echo "--- Loop $i / $LOOPS ---"
            node ingestOdds.js    || LOOP_EXIT=$?
            node computeValues.js || LOOP_EXIT=$?
            node captureSnapshot.js 2>/dev/null || true
            if [ "$i" -lt "$LOOPS" ]; then
              echo "Sleeping 55s before next loop..."
              sleep 55
            fi
          done
          exit $LOOP_EXIT

      - name: Compute API predictive values
        id: api_compute
        continue-on-error: true
        run: node computeApiValues.js

      - name: Post signals
        id: post
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_post != 'true' }}
        run: node postToX.js

      - name: Settle results
        id: results
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_results != 'true' }}
        run: node fetchResults.js

      - name: Fetch match details (lineups + stats)
        id: details
        continue-on-error: true
        run: node fetchMatchDetails.js

      - name: Team statistics & referee tendencies
        id: teamstats
        continue-on-error: true
        shell: bash
        run: |
          # Rolling last-N form / corners / cards / xG per team. Run every
          # invocation — the script self-caches per team (TEAM_STATS_REFRESH_HOURS,
          # default 20h), so re-running it is cheap and it only refetches stale
          # teams. The previous wall-clock gate never aligned with the real
          # dispatch-driven cadence, so stats never populated.
          node fetchTeamStats.js

      - name: Alert on pipeline failure
        if: failure()
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.ENGINE_ALERT_WEBHOOK }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          FAILED_STEPS=""
          [ "${{ steps.plan.outcome }}"        = "failure" ] && FAILED_STEPS="${FAILED_STEPS}\n- plan (planDay.js)"
          [ "${{ steps.ingest_loop.outcome }}" = "failure" ] && FAILED_STEPS="${FAILED_STEPS}\n- ingest-loop (ingestOdds + computeValues + captureSnapshot)"
          [ "${{ steps.api_compute.outcome }}" = "failure" ] && FAILED_STEPS="${FAILED_STEPS}\n- api-compute (computeApiValues.js)"
          [ "${{ steps.post.outcome }}"         = "failure" ] && FAILED_STEPS="${FAILED_STEPS}\n- post-signals (postToX.js)"
          [ "${{ steps.results.outcome }}"      = "failure" ] && FAILED_STEPS="${FAILED_STEPS}\n- settle-results (fetchResults.js)"
          [ "${{ steps.details.outcome }}"      = "failure" ] && FAILED_STEPS="${FAILED_STEPS}\n- fetch-details (fetchMatchDetails.js)"
          [ -z "$FAILED_STEPS" ] && FAILED_STEPS="\n- setup (checkout/node/npm)"

          if [ -n "$WEBHOOK_URL" ]; then
            PAYLOAD=$(printf '{"content":"[FAIL] EVE Engine pipeline failure\nBranch: %s\nRun: %s\nFailed steps:%s"}' \
              "${{ github.ref_name }}" "$RUN_URL" "$FAILED_STEPS")
            curl -s -X POST "$WEBHOOK_URL" -H 'Content-Type: application/json' -d "$PAYLOAD" || true
          fi
          echo "Pipeline failed — steps:$FAILED_STEPS"
