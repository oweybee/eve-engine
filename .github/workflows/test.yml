name: Unit Tests

# Runs the pure-logic engine test suites (no DB / network) on every push and PR.
# Previously no workflow ran these, so regressions in the pricing/settlement math
# reached production unguarded.
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm test
