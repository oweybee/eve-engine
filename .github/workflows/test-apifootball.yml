name: Test API-Football Odds
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
    steps:
      - run: |
          cat << 'SCRIPT' > test.js
          const key = process.env.API_FOOTBALL_KEY
          const https = require('https')
          function get(path) {
            return new Promise((resolve, reject) => {
              const req = https.request({
                hostname: 'v3.football.api-sports.io',
                path,
                headers: { 'x-apisports-key': key },
              }, res => {
                let body = ''
                res.on('data', d => body += d)
                res.on('end', () => {
                  try { resolve({ status: res.statusCode, body: JSON.parse(body), headers: res.headers }) }
                  catch(e) { resolve({ status: res.statusCode, body, headers: res.headers }) }
                })
              })
              req.on('error', reject)
              req.end()
            })
          }
          async function main() {
            const s = await get('/status')
            const r = s.body.response
            console.log('Plan:', r?.subscription?.plan)
            console.log('End:', r?.subscription?.end)
            console.log('Requests today:', r?.requests?.current, '/', r?.requests?.limit_day)
            const o = await get('/odds?league=39&season=2024&bookmaker=8&page=1')
            console.log('Odds endpoint status:', o.status)
            console.log('Odds errors:', JSON.stringify(o.body.errors))
            console.log('Odds results:', o.body.results)
            if (o.body.results > 0) console.log('First fixture:', JSON.stringify(o.body.response[0]?.fixture))
          }
          main().catch(console.error)
          SCRIPT
          node test.js
